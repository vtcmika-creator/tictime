<script>
    // ---------- VARIABLES GLOBALES ----------
    let workSeconds = 0, lunchSeconds = 0, shortPauseSeconds = 0;
    let workRunning = false, lunchRunning = false, shortPauseRunning = false;
    let lastTimestamp = null, workStartTimestamp = null;
    let currentDate = new Date().toDateString();
    let timerInterval = null;
    let pendingConfirmCallback = null;
    let pendingInputCallback = null;
    let sessions = [];
    let workRules = {
        tauxBrut: 16.00, tauxNet: 12.50, statut: "Non-cadre",
        overtimeThreshold: 7, overtimeRate: 0.25,
        overtimeThreshold2: 8, overtimeRate2: 0.50,
        weeklyOvertimeEnabled: false,
        weeklyOvertimeThreshold: 35,
        nightStart: 21, nightEnd: 6, nightRate: 0.20,
        sundayEnabled: true, sundayRate: 0.50,

    function restoreAutoSaveState() {

        if (!saved) return false;
        try {
            const state = JSON.parse(saved);
            const today = new Date().toDateString();
            if (state.currentDate !== today) {
                localStorage.removeItem('autoSaveState');
                return false;
            }
            workSeconds = state.workSeconds || 0;
            lunchSeconds = state.lunchSeconds || 0;
            shortPauseSeconds = state.shortPauseSeconds || 0;
            workRunning = state.workRunning || false;
            lunchRunning = state.lunchRunning || false;

            lastTimestamp = state.lastTimestamp;
            workStartTimestamp = state.workStartTimestamp;
            currentDate = state.currentDate || today;
            workSegments = Array.isArray(state.workSegments) ? state.workSegments : [];

        const start = workRules.nightStart;
        const end = workRules.nightEnd;
        if (start < end) {
            isNight = (hour >= start && hour < end);
        } else {
            isNight = (hour >= start || hour < end);
        }
        if (isNight) {
            document.body.classList.add('dark');
        } else {
            if (!userPrefs.darkMode) {
                document.body.classList.remove('dark');
            } else if (!userPrefs.autoDarkMode) {

    function generateHolidays(year) {
        const paques = (y) => {
            const a = y % 19, b = Math.floor(y/100), c = y%100, d = Math.floor(b/4), e = b%4;
            const f = Math.floor((b+8)/25), g = Math.floor((b-f+1)/3);
            const h = (19*a + b - d - g + 15) % 30;
            const i = Math.floor(c/4), k = c%4;
            const l = (32 + 2*e + 2*i - h - k) % 7;
            const m = Math.floor((a + 11*h + 22*l) / 451);
            const month = Math.floor((h + l - 7*m + 114) / 31);
            const day = ((h + l - 7*m + 114) % 31) + 1;
            return new Date(y, month-1, day);
        };
        const lundiPaques = paques(year);
        const lundiPaquesDate = new Date(year, lundiPaques.getMonth(), lundiPaques.getDate()+1);
        const ascension = new Date(year, lundiPaques.getMonth(), lundiPaques.getDate()+39);
        const lundiPentecote = new Date(year, lundiPaques.getMonth(), lundiPaques.getDate()+50);
        let holidays = [`${year}-01-01`,`${year}-05-01`,`${year}-05-08`,`${year}-07-14`,`${year}-08-15`,`${year}-11-01`,`${year}-11-11`,`${year}-12-25`];
        holidays.push(toLocalISO(lundiPaquesDate), toLocalISO(ascension), toLocalISO(lundiPentecote));
        return holidays;
    }

    function computeYearsSince(dateStr) {
        if (!dateStr) return 0;
        const [year, month] = dateStr.split('-').map(Number);
        const now = new Date();
        let years = now.getFullYear() - year;
        if (now.getMonth() + 1 < month) years--;
        return Math.max(0, years);
    }
    // Cumul des secondes travaillées déjà enregistrées cette semaine (depuis lundi)
    function getWeekPriorSeconds() {
        const now = new Date();
        const monday = new Date(now);
        monday.setHours(0,0,0,0);
        monday.setDate(monday.getDate() - ((now.getDay() + 6) % 7));
        let total = 0;
        for (const s of sessions) {
            const parts = s.date.split('/');
            if (parts.length !== 3) continue;
            const d = new Date(parseInt(parts[2]), parseInt(parts[1])-1, parseInt(parts[0]));
            if (d >= monday && d <= now) {
                const t = s.workTime.split(':');
                total += (parseInt(t[0])||0)*3600 + (parseInt(t[1])||0)*60 + (parseInt(t[2])||0);
            }
        }
        return total;
    }
    // Segments effectifs : segments réels, ou segment synthétique pour les anciens états sauvegardés
    function getEffectiveSegments() {
        const now = Date.now();
        let segs = workSegments
            .filter(s => s && s.start)
            .map(s => ({ start: s.start, end: s.end || now }))
            .filter(s => s.end > s.start);
        if (!segs.length && workSeconds > 0) {
            const startGuess = workStartTimestamp || (now - workSeconds * 1000);
            segs = [{ start: startGuess, end: startGuess + workSeconds * 1000 }];
        }
        return segs.sort((a, b) => a.start - b.start);
    }
    // Secondes de nuit dans l'intervalle [startMs, endMs] selon la plage configurée
    function nightOverlapSec(startMs, endMs) {
        let total = 0;
        const ns = workRules.nightStart, ne = workRules.nightEnd;
        const windows = (ns < ne) ? [[ns, ne]] : [[0, ne], [ns, 24]];
        let day = new Date(startMs); day.setHours(0, 0, 0, 0);
        while (day.getTime() < endMs) {
            const dayStart = day.getTime();
            for (const w of windows) {
                const ov = Math.min(endMs, dayStart + w[1] * 3600000) - Math.max(startMs, dayStart + w[0] * 3600000);
                if (ov > 0) total += ov / 1000;
            }
            day.setDate(day.getDate() + 1);
        }
        return total;
    }
    // Calcul par intervalles : exact malgré les pauses, instantané quelle que soit la durée
    function computeMajorations(totalWorkSecRound, startTime) {
        if (totalWorkSecRound === 0) return { majNuit:0, majDimanche:0, majFerie:0, majHS:0, brutBase:0, netBase:0 };
        const segs = getEffectiveSegments();
        const baseBrutSec = workRules.tauxBrut / 3600;
        const baseNetSec = workRules.tauxNet / 3600;
        const brutBase = totalWorkSecRound * baseBrutSec;
        const netBase = totalWorkSecRound * baseNetSec;
        if (!segs.length) return { majNuit:0, majDimanche:0, majFerie:0, majHS:0, brutBase, netBase };
        let majNuit = 0, majDimanche = 0, majFerie = 0, majHS = 0;
        let cumSec = 0;
        const weekPrior = workRules.weeklyOvertimeEnabled ? getWeekPriorSeconds() : 0;
        const otThresholdSec = workRules.weeklyOvertimeEnabled
            ? Math.max(0, workRules.weeklyOvertimeThreshold * 3600 - weekPrior)
            : workRules.overtimeThreshold * 3600;
        const ot2Sec = (!workRules.weeklyOvertimeEnabled && workRules.overtimeThreshold2) ? workRules.overtimeThreshold2 * 3600 : null;
        for (const seg of segs) {
            let cursor = seg.start;
            while (cursor < seg.end) {
                const d = new Date(cursor);
                const dayEnd = new Date(d); dayEnd.setHours(24, 0, 0, 0);
                const chunkEnd = Math.min(seg.end, dayEnd.getTime());
                const chunkSec = (chunkEnd - cursor) / 1000;
                majNuit += nightOverlapSec(cursor, chunkEnd) * baseBrutSec * workRules.nightRate;
                if (workRules.sundayEnabled && d.getDay() === 0) majDimanche += chunkSec * baseBrutSec * workRules.sundayRate;
                if (workRules.holidayEnabled && workRules.holidaysList.includes(toLocalISO(d))) majFerie += chunkSec * baseBrutSec * workRules.holidayRate;
                const beyond1 = Math.max(0, Math.min(chunkSec, cumSec + chunkSec - otThresholdSec));
                if (beyond1 > 0 && workRules.overtimeRate > 0) {
                    let secRate1 = beyond1, secRate2 = 0;
                    if (ot2Sec !== null && workRules.overtimeRate2) {
                        secRate2 = Math.max(0, Math.min(chunkSec, cumSec + chunkSec - ot2Sec));
                        secRate1 = beyond1 - secRate2;
                    }
                    majHS += secRate1 * baseBrutSec * workRules.overtimeRate + secRate2 * baseBrutSec * (workRules.overtimeRate2 || 0);
                }
                cumSec += chunkSec;
                cursor = chunkEnd;
            }
        }
        return { majNuit, majDimanche, majFerie, majHS, brutBase, netBase };
    }
    function computeTotalSalary(totalWorkSecRound, startTime) {
        const maj = computeMajorations(totalWorkSecRound, startTime);
        let brutTotal = maj.brutBase + maj.majNuit + maj.majDimanche + maj.majFerie + maj.majHS;
        let netTotal = maj.netBase + (maj.majNuit + maj.majDimanche + maj.majFerie + maj.majHS) * (workRules.tauxNet / workRules.tauxBrut);
        let ancienneteBrut = 0, ancienneteNet = 0;
        if (workRules.ancienneteEnabled) {
            if (workRules.ancienneteType === "percent") {
                const years = computeYearsSince(workRules.ancienneteStartDate);
                const pct = workRules.ancienneteValue * years;
                ancienneteBrut = maj.brutBase * (pct / 100);
                ancienneteNet = maj.netBase * (pct / 100);
            } else if (workRules.ancienneteType === "fixed" && workRules.ancienneteValue > 0) {
                // Montant fixe mensuel proratisé sur les heures contractuelles
                const tauxHoraire = workRules.ancienneteValue / (workRules.monthlyContractHours || 151.67);
                ancienneteBrut = tauxHoraire * (totalWorkSecRound / 3600);
                ancienneteNet = ancienneteBrut * (workRules.tauxNet / workRules.tauxBrut);
            }
            brutTotal += ancienneteBrut;
            netTotal += ancienneteNet;
        }
        return { brut: brutTotal, net: netTotal, majNuit: maj.majNuit, majDimanche: maj.majDimanche, majFerie: maj.majFerie, majHS: maj.majHS, ancienneteBrut, ancienneteNet };
    }

    function showWeeklyPage() {

        const dayNames = ['Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi', 'Samedi', 'Dimanche'];
        const todayStr = now.toLocaleDateString('fr-FR');
        let rows = '', tSec = 0, tBrut = 0, tNet = 0, tMaj = 0;
        for (let i = 0; i < 7; i++) {
            const d = new Date(monday); d.setDate(monday.getDate() + i);
            const ds = d.toLocaleDateString('fr-FR');

            const isFuture = d > now && !isToday;
            let sec = 0, b = 0, n = 0, m = 0;

                sec += parseWorkTimeSec(s.workTime);
                b += parseFloat(s.brut) || 0;
                n += parseFloat(s.net) || 0;
                m += parseFloat(s.majBrut) || 0;
            });
            if (isToday && workSeconds > 0) {
                const rounded = getRoundedWorkSeconds();
                const cur = computeTotalSalary(rounded, workStartTimestamp);
                sec += workSeconds; b += cur.brut; n += cur.net;
                m += cur.majNuit + cur.majDimanche + cur.majFerie + cur.majHS;
            }
            tSec += sec; tBrut += b; tNet += n; tMaj += m;
            const leave = leaveData.days.find(x => x.date === toLocalISO(d));
            const left = `${dayNames[i]} ${d.getDate()}${isToday ? ' · aujourd’hui' : ''}${leave ? ' · ' + leave.type : ''}`;
            const right = sec > 0 ? `${formatTime(sec)} — ${b.toFixed(2).replace('.', ',')} € brut` : (leave ? 'Absence' : '—');
            rows += `<div class="maj-line" style="${isToday ? 'font-weight:600;' : ''}${isFuture ? 'opacity:0.4;' : ''}"><span>${left}</span><span style="font-variant-numeric:tabular-nums;">${right}</span></div>`;
        }
        const f = (v) => v.toFixed(2).replace('.', ',');

    function authErrMsg(err) {
        const c = (err && err.code) || '';
        if (c.includes('email-already-in-use')) return "Un compte existe déjà avec cet e-mail. Utilisez « Se connecter ».";
        if (c.includes('invalid-email')) return "Adresse e-mail invalide.";
        if (c.includes('weak-password')) return "Mot de passe trop faible : 6 caractères minimum.";
        if (c.includes('user-not-found') || c.includes('wrong-password') || c.includes('invalid-credential') || c.includes('invalid-login')) return "E-mail ou mot de passe incorrect.";
        if (c.includes('too-many-requests')) return "Trop de tentatives. Réessayez dans quelques minutes.";
        if (c.includes('network')) return "Pas de connexion internet.";
        return "Erreur : " + ((err && err.message) || c);
    }

    function showPayComparePage() {
        const mainDiv = document.querySelector('.main-card');
        const now = new Date();
        const monthNames = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
        mainDiv.innerHTML = `
            <div class="top-bar">
                <div class="left-group"><button class="back-btn" id="backPayBtn"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M14.5 5 L8 12 L14.5 19" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>Retour</button></div>
                <div class="title-container"><div class="main-title" style="font-size:1.2rem;">Comparateur de paie</div></div>
                <div class="right-group"></div>
            </div>
            <div class="card">
                <div class="card-title">Mois à comparer</div>
                <div style="display:flex; gap:10px;">
                    <select id="payMonth" style="flex:2;">${monthNames.map((m, i) => `<option value="${i}" ${i === now.getMonth() ? 'selected' : ''}>${m}</option>`).join('')}</select>
                    <input type="text" id="payYear" class="input-number" style="flex:1;" value="${now.getFullYear()}">
                </div>
                <div class="welcome-group" style="margin-top:16px;"><label>Salaire brut de votre fiche de paie (€)</label><input type="text" id="payBrut" class="input-number" placeholder="ex : 1842,35"></div>
                <button class="btn btn-primary" id="compareBtn">Comparer</button>
            </div>
            <div class="card" id="payResult" style="display:none;"></div>
        `;
        document.getElementById('backPayBtn').onclick = () => loadMainApp();
        document.getElementById('compareBtn').onclick = () => {
            const mois = parseInt(document.getElementById('payMonth').value);
            const annee = parseInt(document.getElementById('payYear').value);
            const ficheBrut = parseFloat(document.getElementById('payBrut').value.replace(',', '.').replace(/\s/g, ''));
            if (isNaN(ficheBrut) || ficheBrut <= 0) { showInfoModal("Saisissez le brut de votre fiche de paie."); return; }
            const monthSessions = sessions.filter(s => { const p = s.date.split('/'); return p.length === 3 && parseInt(p[2]) === annee && parseInt(p[1]) - 1 === mois; });
            if (!monthSessions.length) { showInfoModal("Aucune session enregistrée pour ce mois."); return; }
            let totalHeures = 0, totalBrut = 0, mNuit = 0, mDim = 0, mFer = 0, mHS = 0;
            for (const s of monthSessions) {
                totalHeures += parseWorkTimeSec(s.workTime) / 3600;
                totalBrut += parseFloat(s.brut) || 0;
                if (s.majDetails) { mNuit += s.majDetails.nuit || 0; mDim += s.majDetails.dimanche || 0; mFer += s.majDetails.ferie || 0; mHS += s.majDetails.hs || 0; }
            }
            const totalMaj = mNuit + mDim + mFer + mHS;
            const basePrimes = totalBrut - totalMaj;
            const monthlyPrimes = workRules.primes.filter(p => p.enabled && p.period === "monthly" && p.amount > 0);
            const primesMensuelles = monthlyPrimes.reduce((sum, p) => sum + p.amount, 0);
            let thirteenth = 0;
            if (workRules.thirteenthMonth.enabled && workRules.thirteenthMonth.amount > 0) {
                if (workRules.thirteenthMonth.type === 'monthly') thirteenth = workRules.thirteenthMonth.amount / 12;
                else if (workRules.thirteenthMonth.month === mois) thirteenth = workRules.thirteenthMonth.amount;
            }
            const totalTicTime = totalBrut + primesMensuelles + thirteenth;
            const ecart = ficheBrut - totalTicTime;
            const ecartPct = (ecart / totalTicTime) * 100;
            const f = (n) => n.toFixed(2).replace('.', ',') + ' €';
            const ok = Math.abs(ecartPct) <= 2;
            const ecartColor = ok ? '#2E9E63' : (ecart < 0 ? '#D9534F' : '#D27F26');
            const ecartMsg = ok
                ? "Écart faible : votre paie correspond au calcul TicTime (arrondis et régularisations expliquent les petits écarts)."
                : (ecart < 0
                    ? "Votre fiche de paie est inférieure au calcul TicTime. Vérifiez en priorité les lignes heures supplémentaires et majorations de nuit/dimanche/férié ci-dessus, puis les absences décomptées."

        saveBtn.onclick = () => {

            if (!user) return;
            commitActiveProfile();
            saveBtn.disabled = true;
            fbDb.collection('users').doc(user.uid).set({
                profiles: { activeId: activeProfileId, list: profiles },
                sessions: sessions,
                workRules: workRules,
                leaves: leaveData,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => showInfoModal("Données sauvegardées dans le cloud (" + profiles.length + " employeur" + (profiles.length > 1 ? 's' : '') + ")."))
              .catch(err => showInfoModal("Erreur de sauvegarde : " + err.message))
              .finally(() => { saveBtn.disabled = false; });
        };
        restoreBtn.onclick = () => {
            const user = fbAuth.currentUser;
            if (!user) return;
            customConfirm("Restaurer depuis le cloud ? Vos employeurs locaux seront remplacés par ceux du cloud.", (ok) => {
                if (!ok) return;
                restoreBtn.disabled = true;
                fbDb.collection('users').doc(user.uid).get().then(doc => {

                    const data = doc.data();
                    // Sauvegarde multi-profils : remplace l'ensemble des profils locaux
                    if (data.profiles && Array.isArray(data.profiles.list) && data.profiles.list.length) {
                        profiles = data.profiles.list;

                    // Ancienne sauvegarde mono-profil : fusion dans le profil actif
                    let added = 0;
                    if (Array.isArray(data.sessions)) {
                        for (const s of data.sessions) {
                            if (!s || !s.date || !s.workTime) continue;
                            const exists = sessions.some(ex => ex.date === s.date && ex.timeOfDay === s.timeOfDay);
                            if (!exists) { sessions.push(s); added++; }
                        }
                        sessions.sort((a,b) => new Date(b.date.split('/').reverse().join('-')) - new Date(a.date.split('/').reverse().join('-')));
                        if (sessions.length > 50) sessions = sessions.slice(0,50);
                        saveSessions();
                    }
                    if (data.workRules) {
                        workRules = { ...workRules, ...data.workRules };
                        if (!workRules.holidaysList || !workRules.holidaysList.length) workRules.holidaysList = generateHolidays(new Date().getFullYear());
                        saveWorkRules();
                    }
                    if (data.leaves) {
                        leaveData = { ...leaveData, ...data.leaves };
                        if (!Array.isArray(leaveData.days)) leaveData.days = [];
                        saveLeaveData();
                    }
                    showInfoModal(`Restauration terminée : ${added} session(s) ajoutée(s), employeur mis à jour.`);
                }).catch(err => showInfoModal("Erreur de restauration : " + err.message))
                  .finally(() => { restoreBtn.disabled = false; });
            });
        };
    }
    // ---------- IMPORT JSON ET SUPPRESSION DE SESSION ----------
    function importJSON() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'application/json';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const text = await file.text();
            try {
                const imported = JSON.parse(text);
                if (!Array.isArray(imported)) throw new Error("Format invalide : attend un tableau");
                let added = 0;
                for (const s of imported) {
                    if (!s.date || !s.workTime) continue;
                    const exists = sessions.some(ex => ex.date === s.date && ex.timeOfDay === s.timeOfDay);
                    if (!exists) {
                        sessions.push(s);
                        added++;
                    }
                }
                if (added > 0) {
                    sessions.sort((a,b) => new Date(b.date.split('/').reverse().join('-')) - new Date(a.date.split('/').reverse().join('-')));
                    if (sessions.length > 50) sessions = sessions.slice(0,50);
                    saveSessions();
                    renderHistory();
                    showInfoModal(`${added} session(s) importée(s).`);
                } else {
                    showInfoModal("Aucune nouvelle session importée (doublons).");
                }
            } catch(err) {
                showInfoModal("Erreur : fichier JSON invalide.");
            }
        };
        input.click();
    }
    function deleteSession(index) {
        customConfirm("Supprimer cette session ?", (ok) => {
            if (ok) {
                sessions.splice(index, 1);
                saveSessions();

            }
        });
    }

        // Render main app first
        renderMainApp();
        // Then restore auto-save state (DOM now exists)
        const restored = restoreAutoSaveState();
        if (!restored) {
            workSeconds = 0; lunchSeconds = 0; shortPauseSeconds = 0;
            workRunning = false; lunchRunning = false; shortPauseRunning = false;
            lastTimestamp = null; workStartTimestamp = null;

        }
        // Force update displays after restore
        updateAllDisplays();
        updateButtonsUI();
        // Note : ne PAS arrêter le timer ici — il doit continuer si le travail est en cours
        // sessions est déjà chargé depuis le profil actif (applyActiveProfileToGlobals)
        sessions = (sessions || []).filter(s => s && s.date && s.workTime);

    function formatTime(sec) { const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60; return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }
    function roundSeconds(seconds, rule) {
        if (rule === "none") return seconds;
        let totalMinutes = seconds/60, rounded;
        if (rule === "minute") rounded = Math.round(totalMinutes);
        else if (rule === "5min") rounded = Math.round(totalMinutes/5)*5;
        else if (rule === "10min") rounded = Math.round(totalMinutes/10)*10;
        else if (rule === "15min") rounded = Math.round(totalMinutes/15)*15;
        else return seconds;
        return Math.max(0, rounded*60);
    }
    function getRoundedWorkSeconds() { return roundSeconds(workSeconds, workRules.roundingRule); }
    function ensureWorkStartTimestamp() {
        if (workSeconds > 0 && workStartTimestamp === null) {
            workStartTimestamp = Date.now() - (workSeconds * 1000);

    // ---------- RÉSUMÉ SEMAINE / SOLDES D'HEURES ----------
    function parseWorkTimeSec(wt) {
        const p = (wt || '').split(':');
        if (p.length !== 3) return 0;
        return (parseInt(p[0]) || 0) * 3600 + (parseInt(p[1]) || 0) * 60 + (parseInt(p[2]) || 0);
    }
    function updateWeekSummary(total) {
        const weekHoursEl = document.getElementById('weekHours');
        if (!weekHoursEl) return;
        const now = new Date();
        const monday = new Date(now);
        monday.setHours(0, 0, 0, 0);
        monday.setDate(monday.getDate() - ((now.getDay() + 6) % 7));
        let weekSec = 0, weekNet = 0, monthSec = 0;
        for (const s of sessions) {
            const parts = (s.date || '').split('/');
            if (parts.length !== 3) continue;
            const d = new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]));
            const sec = parseWorkTimeSec(s.workTime);
            if (d >= monday && d <= now) { weekSec += sec; weekNet += parseFloat(s.net) || 0; }
            if (d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear()) monthSec += sec;
        }
        // Journée en cours incluse en temps réel
        weekSec += workSeconds; monthSec += workSeconds;
        weekNet += (total && total.net) || 0;
        const weekH = weekSec / 3600, monthH = monthSec / 3600;
        weekHoursEl.innerText = `${weekH.toFixed(1).replace('.', ',')} h · ${weekNet.toFixed(2).replace('.', ',')} € net`;
        // Référence ajustée des jours d'absence posés (CP, RTT, autre) : 1 jour = 1/5 de semaine
        const dailyH = (workRules.weeklyContractHours || 35) / 5;
        const sunday = new Date(monday); sunday.setDate(sunday.getDate() + 6); sunday.setHours(23, 59, 59, 0);
        const leavesW = countLeaveDays(monday, sunday);
        const leavesM = countLeaveDays(new Date(now.getFullYear(), now.getMonth(), 1), new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59));
        const refW = Math.max(0, Math.round(((workRules.weeklyContractHours || 35) - leavesW * dailyH) * 10) / 10);
        const refM = Math.max(0, Math.round(((workRules.monthlyContractHours || 151.67) - leavesM * dailyH) * 10) / 10);
        const fmtBalance = (diff) => (diff >= 0 ? '+' : '−') + Math.abs(diff).toFixed(1).replace('.', ',') + ' h';
        const wDiff = weekH - refW, mDiff = monthH - refM;
        const weekBalEl = document.getElementById('weekBalance');
        const monthBalEl = document.getElementById('monthBalance');
        document.getElementById('weekBalanceLabel').innerText = `Solde hebdo (${String(refW).replace('.', ',')} h${leavesW > 0 ? ', congés déduits' : ''})`;
        document.getElementById('monthBalanceLabel').innerText = `Solde mensuel (${String(refM).replace('.', ',')} h${leavesM > 0 ? ', congés déduits' : ''})`;
        weekBalEl.innerText = fmtBalance(wDiff);
        weekBalEl.className = wDiff >= 0 ? 'bal-pos' : 'bal-neg';
        monthBalEl.innerText = fmtBalance(mDiff);
        monthBalEl.className = mDiff >= 0 ? 'bal-pos' : 'bal-neg';
    }
    // ---------- HEURE DE FIN ESTIMÉE + MAJORATIONS ACTIVES ----------
    function updateEtaAndActiveMaj() {
        const etaEl = document.getElementById('etaLabel');
        if (etaEl) {
            const threshold = workRules.overtimeThreshold;
            if (workRunning && threshold > 0) {
                const remaining = threshold * 3600 - workSeconds;
                if (remaining > 0) {
                    const eta = new Date(Date.now() + remaining * 1000);
                    etaEl.innerText = `${String(threshold).replace('.', ',')} h atteintes à ${eta.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' })}`;
                } else {
                    etaEl.innerText = `Seuil de ${String(threshold).replace('.', ',')} h dépassé`;
                }
                etaEl.style.display = 'block';
            } else {
                etaEl.style.display = 'none';
            }
        }
        const activeEl = document.getElementById('activeMaj');
        if (activeEl) {
            let badges = '';
            if (workRunning) {
                const now = new Date();
                const h = now.getHours();
                const isNight = (h >= workRules.nightStart || h < workRules.nightEnd);
                if (isNight && workRules.nightRate > 0) badges += `<span class="maj-badge">Nuit +${Math.round(workRules.nightRate * 100)} % en cours</span>`;
                if (workRules.sundayEnabled && now.getDay() === 0 && workRules.sundayRate > 0) badges += `<span class="maj-badge">Dimanche +${Math.round(workRules.sundayRate * 100)} % en cours</span>`;
                if (workRules.holidayEnabled && workRules.holidaysList.includes(toLocalISO(now)) && workRules.holidayRate > 0) badges += `<span class="maj-badge">Férié +${Math.round(workRules.holidayRate * 100)} % en cours</span>`;
                const otActive = workRules.weeklyOvertimeEnabled
                    ? (getWeekPriorSeconds() + workSeconds > workRules.weeklyOvertimeThreshold * 3600)
                    : (workSeconds > workRules.overtimeThreshold * 3600);
                if (otActive && workRules.overtimeRate > 0) badges += `<span class="maj-badge">Heures sup. en cours</span>`;
            }
            activeEl.innerHTML = badges;
        }
    }
    function tick() { if (!lastTimestamp) return; const now=Date.now(), elapsed=Math.floor((now-lastTimestamp)/1000); if(elapsed>=1){ if(workRunning) workSeconds+=elapsed; else if(lunchRunning) lunchSeconds+=elapsed; else if(shortPauseRunning) shortPauseSeconds+=elapsed; lastTimestamp=now; updateAllDisplays(); updateButtonsUI(); checkDateChange(); } }
    function startTimer() { if(timerInterval) clearInterval(timerInterval); timerInterval = setInterval(tick,200); }
    function checkDateChange() { const today=new Date().toDateString(); if(today!==currentDate){ resetAtMidnight(); currentDate=today; showInfoModal("Nouvelle journée - compteurs remis à zéro"); } }
    function resetAtMidnight() { if(workSeconds||lunchSeconds||shortPauseSeconds) saveSessionToHistory(); workSeconds=lunchSeconds=shortPauseSeconds=0; workRunning=lunchRunning=shortPauseRunning=false; workStartTimestamp=lastTimestamp=null; workSegments=[]; updateButtonsUI(); updateAllDisplays(); saveStateToLocal(); }
    function saveSessionToHistory(geoEnd) {
        tick();
        const rounded=getRoundedWorkSeconds();
        if(rounded===0 && lunchSeconds===0 && shortPauseSeconds===0) return;
        const now=new Date(), dateStr=now.toLocaleDateString('fr-FR'), timeStr=now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
        ensureWorkStartTimestamp();
        closeOpenSegment();
        const segs = getEffectiveSegments();
        const firstStart = segs.length ? new Date(segs[0].start).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}) : '';
        const total = computeTotalSalary(rounded, workStartTimestamp);
        const dailyPrimes = getDailyPrimes();
        // Primes journalières comptées une seule fois par jour, pas à chaque session
        const dejaUneSessionCeJour = sessions.some(s => s && s.date === dateStr);
        let primesTotal = dejaUneSessionCeJour ? 0 : dailyPrimes.reduce((s,p)=> s + p.amount, 0);
        const brutTotal = total.brut + primesTotal;
        const netTotal = total.net + primesTotal * (workRules.tauxNet / workRules.tauxBrut);
        const session = { date: dateStr, timeOfDay: timeStr, startTime: firstStart, workTime: formatTime(rounded), lunchTime: formatTime(lunchSeconds), shortPauseTime: formatTime(shortPauseSeconds), brut: brutTotal.toFixed(2), net: netTotal.toFixed(2), majBrut: (total.majNuit+total.majDimanche+total.majFerie+total.majHS).toFixed(2), majDetails: { nuit: total.majNuit, dimanche: total.majDimanche, ferie: total.majFerie, hs: total.majHS } };
        // Géolocalisation : positions du jour (si activée pour cet employeur)
        let geoStart=null; try{ const gs=JSON.parse(localStorage.getItem('geoStart')||'null'); if(gs && gs.date===now.toDateString()) geoStart={lat:gs.lat,lng:gs.lng,acc:gs.acc,t:gs.t}; }catch(e){}
        if(geoStart || geoEnd) session.geo = { start: geoStart, end: geoEnd || null };
        localStorage.removeItem('geoStart');
        sessions.unshift(session);
        if(sessions.length>50) sessions.pop();
        saveSessions();
        renderHistory();
        workSeconds = 0; lunchSeconds = 0; shortPauseSeconds = 0;
        workRunning = false; lunchRunning = false; shortPauseRunning = false;
        workStartTimestamp = null; lastTimestamp = null;
        workSegments = [];
        updateAllDisplays();
        updateButtonsUI();
        saveStateToLocal();
    }

                    <div>Travail: ${s.workTime} | Déj: ${s.lunchTime} | Pause: ${s.shortPauseTime}</div>
                    <div>Brut: ${s.brut}€ | Net: ${s.net}€</div>
                    <div>Maj: ${s.majBrut}€</div>
                    ${s.geo ? `<div style="font-size:0.7rem; color:var(--text-secondary); margin-top:2px;">${geoHistoryHtml(s.geo)}</div>` : ''}
                </div>
                <span class="delete-session mono-icon" data-index="${idx}">🗑️</span>
            </div>
        `).join('');
        document.querySelectorAll('.delete-session').forEach(el => {

    function updateButtonsUI() {
        const startWorkBtn = document.getElementById('startWorkBtn');
        if (!startWorkBtn) return;
        const lunchBtn = document.getElementById('lunchToggleBtn');
        const pauseBtn = document.getElementById('shortPauseToggleBtn');
        const stopDayBtn = document.getElementById('stopDayBtn');
        const hamburgerBtn = document.getElementById('hamburgerBtn');
        const statusDot = document.getElementById('statusDot');
        const statusLabel = document.getElementById('statusLabel');
        const forgotLink = document.getElementById('forgotLink');

        // Bouton principal : libellé selon l'état
        startWorkBtn.innerText = workRunning ? 'Travail en cours' : (workSeconds > 0 ? 'Reprendre le travail' : 'Commencer');
        startWorkBtn.disabled = workRunning;

        // Boutons bascule des pauses
        lunchBtn.innerText = lunchRunning ? 'Reprendre le travail' : 'Pause déjeuner';
        lunchBtn.classList.toggle('btn-lunch', lunchRunning);
        lunchBtn.classList.toggle('btn-secondary', !lunchRunning);
        pauseBtn.innerText = shortPauseRunning ? 'Reprendre le travail' : 'Pause courte';
        pauseBtn.classList.toggle('btn-lunch', shortPauseRunning);
        pauseBtn.classList.toggle('btn-secondary', !shortPauseRunning);

        // Indicateur d'état
        if (statusDot && statusLabel) {
            let cls = 'stopped', label = 'Arrêté';
            if (workRunning) { cls = 'running'; label = 'Travail en cours'; }
            else if (lunchRunning) { cls = 'paused'; label = 'Pause déjeuner'; }
            else if (shortPauseRunning) { cls = 'paused'; label = 'Pause courte'; }
            else if (workSeconds > 0) { label = 'Interrompu'; }
            statusDot.className = 'status-dot ' + cls;
            statusLabel.innerText = label;
        }

        // Raccourci saisie manuelle visible seulement avant le démarrage
        if (forgotLink) forgotLink.style.display = (!workRunning && !lunchRunning && !shortPauseRunning && workSeconds === 0) ? 'block' : 'none';

        const hasAnyTime = (workSeconds + lunchSeconds + shortPauseSeconds) > 0;
        if (locked) {
            startWorkBtn.disabled = true; lunchBtn.disabled = true; pauseBtn.disabled = true; stopDayBtn.disabled = true;
            if (hamburgerBtn) hamburgerBtn.disabled = true;
        } else {
            lunchBtn.disabled = false; pauseBtn.disabled = false;
            stopDayBtn.disabled = !hasAnyTime;
            if (hamburgerBtn) hamburgerBtn.disabled = false;
        }
    }
    function startWork(){ if(locked || workRunning) return; lunchRunning=false; shortPauseRunning=false; workRunning=true; openSegment(); lastTimestamp=Date.now(); if(workStartTimestamp===null && workSeconds===0) workStartTimestamp=lastTimestamp; if(workRules.geoEnabled) maybeCaptureGeoStart(); startTimer(); updateButtonsUI(); updateAllDisplays(); saveStateToLocal(); }
    function toggleLunch(){ if(locked) return; tick(); if(lunchRunning){ lunchRunning=false; workRunning=true; openSegment(); } else { if(workRunning) closeOpenSegment(); workRunning=false; shortPauseRunning=false; lunchRunning=true; } lastTimestamp=Date.now(); startTimer(); updateButtonsUI(); updateAllDisplays(); saveStateToLocal(); }
    function toggleShortPause(){ if(locked) return; tick(); if(shortPauseRunning){ shortPauseRunning=false; workRunning=true; openSegment(); } else { if(workRunning) closeOpenSegment(); workRunning=false; lunchRunning=false; shortPauseRunning=true; } lastTimestamp=Date.now(); startTimer(); updateButtonsUI(); updateAllDisplays(); saveStateToLocal(); }
    function stopDay(){ if(locked) return; customConfirm("Arrêter la journée et enregistrer les données ?",(ok)=>{ if(!ok) return; const finish=(geoEnd)=>{ if(workSeconds>0 || lunchSeconds>0 || shortPauseSeconds>0) saveSessionToHistory(geoEnd); updateAllDisplays(); updateButtonsUI(); showInfoModal("Session enregistrée et compteurs remis à zéro"); }; if(workRules.geoEnabled){ captureGeo(g=>finish(g)); } else { finish(null); } }); }
    // Exports (CSV, copy, PDF)
    function exportCSV() {
        if (sessions.length === 0) { showInfoModal("Aucune session à exporter."); return; }
        let csvRows = [["Date", "Heures travaillées", "Salaire brut (€)", "Salaire net (€)", "Majorations (€)"]];
        for (let s of sessions) { csvRows.push([s.date, s.workTime, s.brut, s.net, s.majBrut]); }
        const csvContent = csvRows.map(row => row.join(";")).join("\n");
        const blob = new Blob(["﻿" + csvContent], { type: "text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "historique_salaire.csv";
        a.click();
        URL.revokeObjectURL(url);
        showInfoModal("Export CSV terminé");
    }
    function copyDayDetails() {
        // Agrège les sessions déjà enregistrées aujourd'hui + le travail en cours
        const todayStr = new Date().toLocaleDateString('fr-FR');
        const todaySessions = sessions.filter(s => s && s.date === todayStr);
        let secDone = 0, brutDone = 0, netDone = 0, mNuit = 0, mDim = 0, mFer = 0, mHS = 0;
        for (const s of todaySessions) {
            secDone += parseWorkTimeSec(s.workTime);
            brutDone += parseFloat(s.brut) || 0;
            netDone += parseFloat(s.net) || 0;
            if (s.majDetails) { mNuit += s.majDetails.nuit || 0; mDim += s.majDetails.dimanche || 0; mFer += s.majDetails.ferie || 0; mHS += s.majDetails.hs || 0; }
        }
        const rounded = getRoundedWorkSeconds();
        const cur = computeTotalSalary(rounded, workStartTimestamp);
        mNuit += cur.majNuit; mDim += cur.majDimanche; mFer += cur.majFerie; mHS += cur.majHS;
        const dailyPrimes = getDailyPrimes();
        const primesTotal = dailyPrimes.reduce((a, p) => a + p.amount, 0);
        const primesDejaIncluses = todaySessions.length > 0;
        const netCoeff = workRules.tauxNet / workRules.tauxBrut;
        const totBrut = brutDone + cur.brut + (primesDejaIncluses ? 0 : primesTotal);
        const totNet = netDone + cur.net + (primesDejaIncluses ? 0 : primesTotal * netCoeff);
        const f = (n) => n.toFixed(2).replace('.', ',') + ' €';
        let text = `TicTime — Détail du jour (${todayStr})\n\n`;
        text += `Sessions enregistrées : ${todaySessions.length} — ${formatTime(secDone)} — ${f(brutDone)} brut / ${f(netDone)} net\n`;
        text += `En cours (non enregistré) : ${formatTime(workSeconds)} réel (${formatTime(rounded)} arrondi) — ${f(cur.brut)} brut\n`;
        text += `Total du jour : ${formatTime(secDone + workSeconds)} — ${f(totBrut)} brut / ${f(totNet)} net\n\n`;
        text += `Majorations du jour : Nuit ${f(mNuit)}, Dimanche ${f(mDim)}, Férié ${f(mFer)}, Heures sup. ${f(mHS)}\n`;
        if (dailyPrimes.length) text += `Primes journalières : ${dailyPrimes.map(p => `${p.name} ${f(p.amount)}`).join(', ')}${primesDejaIncluses ? ' (déjà incluses dans les sessions)' : ''}\n`;
        navigator.clipboard.writeText(text).then(() => showInfoModal("Détail du jour copié dans le presse-papier")).catch(() => showInfoModal("Erreur lors de la copie"));
    }
    function exportPDFWithShare() {
        const now = new Date();
        const currentYear = now.getFullYear();
        const currentMonth = now.getMonth() + 1;
        const defaultValue = `${currentMonth.toString().padStart(2,'0')}/${currentYear}`;
        showInputModal("Choisissez le mois (MM/AAAA) :", (moisSelection) => {
            if(!moisSelection) return;
            const regex = /^(0[1-9]|1[0-2])\/([0-9]{4})$/;
            if(!regex.test(moisSelection)){ showInfoModal("Format invalide. Utilisez MM/AAAA"); return; }
            generateMonthlyPDF(moisSelection);
        }, defaultValue, 'text');
    }
    async function generateMonthlyPDF(moisSelection) {
        const [moisStr, anneeStr] = moisSelection.split('/');
        let mois = parseInt(moisStr)-1, annee = parseInt(anneeStr);
        const sessionsFiltrees = sessions.filter(s => { const parts = s.date.split('/'); if(parts.length!==3) return false; return parseInt(parts[2])===annee && (parseInt(parts[1])-1)===mois; });
        if(sessionsFiltrees.length===0){ showInfoModal("Aucune session pour cette période."); return; }
        sessionsFiltrees.sort((a,b)=>new Date(a.date.split('/').reverse().join('-')) - new Date(b.date.split('/').reverse().join('-')));
        let totalHeures=0,totalBrut=0,totalNet=0,totalMaj=0;
        for(const s of sessionsFiltrees){
            const parts = s.workTime.split(':');
            const heures = parseInt(parts[0]) + parseInt(parts[1])/60 + parseInt(parts[2])/3600;
            totalHeures += heures; totalBrut += parseFloat(s.brut); totalNet += parseFloat(s.net); totalMaj += parseFloat(s.majBrut);
        }
        const monthNames = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
        // Compléments mensuels : primes mensuelles et 13e mois
        const netCoeff = workRules.tauxNet / workRules.tauxBrut;
        const monthlyPrimes = workRules.primes.filter(p => p.enabled && p.period === "monthly" && p.amount > 0).map(p => ({ name: p.customName || p.name, amount: p.amount }));
        const primesMensuellesTotal = monthlyPrimes.reduce((s,p)=> s + p.amount, 0);
        let thirteenthAmount = 0, thirteenthLabel = "";
        if (workRules.thirteenthMonth.enabled && workRules.thirteenthMonth.amount > 0) {
            if (workRules.thirteenthMonth.type === 'monthly') {
                thirteenthAmount = workRules.thirteenthMonth.amount / 12;
                thirteenthLabel = "13e mois (mensualisé)";
            } else if (workRules.thirteenthMonth.month === mois) {
                thirteenthAmount = workRules.thirteenthMonth.amount;
                thirteenthLabel = "13e mois (versement)";
            }
        }
        const complementsTotal = primesMensuellesTotal + thirteenthAmount;
        let complementsHtml = "";
        if (complementsTotal > 0) {
            let lignes = monthlyPrimes.map(p => `<tr><td style="border:1px solid #ccc;padding:8px;">${p.name}</td><td style="border:1px solid #ccc;padding:8px;">${p.amount.toFixed(2)} €</td></tr>`).join('');
            if (thirteenthAmount > 0) lignes += `<tr><td style="border:1px solid #ccc;padding:8px;">${thirteenthLabel}</td><td style="border:1px solid #ccc;padding:8px;">${thirteenthAmount.toFixed(2)} €</td></tr>`;
            complementsHtml = `<h3 style="margin-top:20px;">Compléments mensuels</h3><table style="width:100%; border-collapse:collapse;"><tbody>${lignes}</tbody></table><p style="margin-top:16px; font-weight:bold;">Total général : ${(totalBrut + complementsTotal).toFixed(2)} € brut | ${(totalNet + complementsTotal * netCoeff).toFixed(2)} € net (estimé)</p>`;
        }
        const container = document.createElement('div');
        container.style.padding='20px'; container.style.fontFamily='system-ui'; container.style.backgroundColor='white'; container.style.color='black';
        container.innerHTML = `<h1 style="text-align:center;">Bilan mensuel</h1><h2 style="text-align:center;">${monthNames[mois]} ${annee}</h2><table style="width:100%; border-collapse:collapse;"><thead><tr><th style="border:1px solid #ccc;padding:8px;">Date</th><th>Heures</th><th>Brut(€)</th><th>Net(€)</th><th>Maj(€)</th></tr></thead><tbody>${sessionsFiltrees.map(s=>`<tr><td style="border:1px solid #ccc;padding:8px;">${s.date}</td><td style="border:1px solid #ccc;padding:8px;">${s.workTime}</td><td style="border:1px solid #ccc;padding:8px;">${s.brut}€</td><td style="border:1px solid #ccc;padding:8px;">${s.net}€</td><td style="border:1px solid #ccc;padding:8px;">${s.majBrut}€</td></tr>`).join('')}</tbody><tfoot><tr style="font-weight:bold;"><td style="border:1px solid #ccc;padding:8px;">Total</td><td style="border:1px solid #ccc;padding:8px;">${totalHeures.toFixed(2)} h</td><td style="border:1px solid #ccc;padding:8px;">${totalBrut.toFixed(2)} €</td><td style="border:1px solid #ccc;padding:8px;">${totalNet.toFixed(2)} €</td><td style="border:1px solid #ccc;padding:8px;">${totalMaj.toFixed(2)} €</td></tr></tfoot></table>${complementsHtml}`;
        document.body.appendChild(container);
        try {
            const canvas = await html2canvas(container, { scale: 2 });
            const imgData = canvas.toDataURL('image/png');
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            const imgWidth = 190;
            const imgHeight = (canvas.height * imgWidth) / canvas.width;
            pdf.addImage(imgData, 'PNG', 10, 10, imgWidth, imgHeight);
            const pdfBlob = pdf.output('blob');
            const pdfUrl = URL.createObjectURL(pdfBlob);
            if (navigator.share) {
                await navigator.share({ title: `Bilan ${monthNames[mois]} ${annee}`, files: [new File([pdfBlob], `bilan_${monthNames[mois]}_${annee}.pdf`, { type: 'application/pdf' })] });
                showInfoModal("PDF partagé");
            } else {
                const a = document.createElement('a'); a.href = pdfUrl; a.download = `bilan_${monthNames[mois]}_${annee}.pdf`; a.click();
                showInfoModal("PDF généré");
            }
            URL.revokeObjectURL(pdfUrl);
        } catch(e) { showInfoModal("Erreur PDF"); } finally { document.body.removeChild(container); }
    }

        navigator.serviceWorker.register('sw.js').catch(() => {});
    }
</script>
